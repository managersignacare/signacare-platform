  - bug_id: BUG-040
    severity: S0
    track: A
    wave: A-2
    state: fixed
    title: Psychologist prescribing barrier — AHPRA-compliant app-layer guard + DB trigger
    root_cause: "patient_medications.prescribed_by_staff_id is a nullable FK to staff.id with NO database-level CHECK on the prescriber's AHPRA discipline, and app-layer requireSpecialty helper in authGuards.ts is NOT called from medicationService.ts. A compromised app path, a future buggy refactor, or direct SQL bypass can record a psychologist (or any non-prescribing discipline) as the prescriber of record, violating AHPRA / Psychology Board of Australia rules."
    accepted_pattern: |
      Two-layer defence (mirrors BUG-039):

      Layer A — App-layer gate:
        requirePrescribingDiscipline(auth) helper in apps/api/src/shared/
        authGuards.ts. SELECTs the SSoT function from DB so the allow-list
        cannot drift. Called by medicationService.create + update (only
        when prescribedByStaffId is in the update payload). Fails fast
        with HTTP 403 PRESCRIBING_DISCIPLINE_REQUIRED.

      Layer B — DB trigger:
        is_prescribing_eligible_discipline(slug TEXT) STABLE SQL function
        is the single source of truth for the allow-list. Both the trigger
        and the app-layer helper call it.

        patient_medications_prescriber_discipline_check() PL/pgSQL trigger
        function looks up staff.discipline via NEW.prescribed_by_staff_id
        and RAISE EXCEPTION 'prescriber discipline "%" not authorised to
        prescribe (BUG-040)'.

        BEFORE INSERT + BEFORE UPDATE OF prescribed_by_staff_id triggers —
        fires only when the prescriber column is (re)set. Fires for ALL
        roles including dbAdmin. Allows NULL (legacy/transient paths).

      Allow-list (AHPRA-compliant):
        ALLOW: psychiatry, general-practice, nurse-practitioner
        DENY: clinical-psychology, general-psychology, counselling-
              psychology, mental-health-nursing, registered-nursing,
              enrolled-nursing, social-work, occupational-therapy,
              pharmacy, dietetics, physiotherapy, speech-pathology,
              aboriginal-health-work, peer-support, counselling,
              art-therapy, exercise-physiology
    files_touched:
