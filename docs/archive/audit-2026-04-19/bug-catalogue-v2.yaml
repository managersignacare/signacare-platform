    discovered_by: "L4 clinical-safety retroactive 2026-04-23"
    discovered_at: "2026-04-23"
    notes: |
      BUG-354 trigger only fires on NEW transitions of
      staff.(role, is_active, deleted_at, clinic_id). Any clinic whose
      nominated/delegated admin currently points at a staff row where
      is_active=false OR deleted_at IS NOT NULL OR role IN operational-
      only roles is a pre-existing stale-slot vulnerability the trigger
      will NOT self-heal.
      Fix: one-off migration that NULLs all currently-stale slots + emits
      'ADMIN_SLOT_CLEARED_RECONCILIATION' audit rows. L4 reconciliation
      query provided in docs/audit-2026-04-22/parked-work.md.

