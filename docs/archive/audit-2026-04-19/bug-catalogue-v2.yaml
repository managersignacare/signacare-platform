  - bug_id: BUG-039
    severity: S0
    track: A
    wave: A-2
    state: fixed
    title: audit_log must REVOKE UPDATE/DELETE + have immutability trigger (tamper-evident)
    root_cause: "audit_log in the v2 baseline grants UPDATE / DELETE / TRUNCATE to app_user by default (Postgres inherits owner privileges on CREATE TABLE), so a compromised runtime role — or any future code path with UPDATE/DELETE — can silently rewrite or delete audit history. Violates HIPAA 164.312(b) audit controls and APP 11.1 security. Legacy pre-partition migrations (20260331_audit_log_tamper_protection + 20260412000004_audit_log_partitioning) had the REVOKE + triggers, but the v2 baseline squash dropped them. Integration test auditLogImmutability.test.ts Layer 2 asserts has_table_privilege(app_user, audit_log, UPDATE/DELETE) is false — currently FAILING pre-fix."
    accepted_pattern: |
      Two-layer defence (canonical pattern from archived migrations):

      Layer A — DB grant revocation:
        REVOKE UPDATE, DELETE, TRUNCATE ON audit_log FROM app_user
        (INSERT + SELECT retained; fast-fail at Postgres planner)

      Layer B — BEFORE UPDATE/DELETE triggers:
        audit_log_prevent_mutation() PL/pgSQL function that
        RAISE EXCEPTION 'audit_log is append-only (BUG-039 tamper-evident)'
        + BEFORE UPDATE + BEFORE DELETE triggers. Fires for ALL roles
        including dbAdmin (owner), so a future GRANT ALL regression or
        a compromised owner role is still blocked.

      Why BOTH: REVOKE alone could be re-opened by a future `GRANT ALL`;
      trigger alone works but the grant layer is the fast-fail. Together
      match the canonical defence-in-depth pattern.

      Migration 20260421000002_audit_log_immutability.ts is idempotent
      (DROP IF EXISTS + CREATE OR REPLACE). down() drops triggers +
      function + re-grants UPDATE/DELETE/TRUNCATE (CAB required for
      prod rollback; dev-only per plan §10).
    files_touched:
      - apps/api/migrations/20260421000002_audit_log_immutability.ts
      - apps/api/tests/integration/auditLogImmutability.test.ts
      - apps/api/src/db/schema-snapshot.json
      - docs/audit-2026-04-19/bug-plans/BUG-039-audit-log-immutability.md
      - docs/audit-2026-04-19/bug-catalogue-v2.yaml
      - docs/fix-registry.md
    fix_summary: |
      Migration adds REVOKE UPDATE/DELETE/TRUNCATE from app_user +
      BEFORE UPDATE/DELETE triggers raising 'audit_log is append-only'.
      Role-existence guarded by pg_roles check (dev DBs may skip
      app_user creation). writeAuditLog unchanged — only INSERTs via
      dbAdmin; zero legitimate mutation paths exist in apps/api/src.
      16 integration tests pass post-fix (2 pre-existing + 2 new
      defence-in-depth assertions for the trigger firing against
      dbAdmin UPDATE/DELETE).
    red_first_trace:
      pre_fix: "auditLogImmutability.test.ts Layer 2 has_table_privilege(app_user, audit_log, UPDATE/DELETE) === false FAILS (grants were not revoked; privilege is true). 2 new trigger tests would FAIL (triggers don't exist)."
      post_fix: "16/16 PASS. grant assertions green; trigger raises `audit_log is append-only (BUG-039 tamper-evident)` on dbAdmin UPDATE + DELETE attempts."
    rejected_approaches:
      - "REVOKE only, no trigger — a future GRANT ALL regression silently re-opens the hole. Trigger is the cryptographic-fact-level guarantee."
      - "Trigger only, no REVOKE — grant layer is first-line fast-fail; without REVOKE every attempted UPDATE walks through planner + trigger (wasted work). Both layers together are canonical."
      - "Use CREATE RULE DO INSTEAD NOTHING — RULE on partitioned table is unsupported; trigger approach is forward-compatible with partitioning."
      - "Use RLS policies with USING (false) for UPDATE/DELETE — owner bypasses RLS; trigger fires for all roles."
      - "Include hash chain (SHA-256 prev_hash/row_hash) in this commit — scope creep. BUG-287 (S2 B-9) tracks hash chain re-implementation (dropped in v2 baseline squash)."
      - "Apply same fix to llm_interactions — scope creep. BUG-037 already makes it append-only at app layer; BUG-286 (S1 A-3) tracks DB-level tamper-evidence parity."
      - "Re-apply partitioning in this commit — bigger change (per-partition REVOKE+trigger + cross-cutting retention). BUG-288 (S2 B-9) tracks."
    open_risks:
      - "llm_interactions table is audit-class but has no equivalent REVOKE+trigger — BUG-286 (S1 A-3, dated SLA Wave A-3 exit) tracks parity fix."
      - "SHA-256 hash chain was dropped in v2 baseline squash — no cryptographic tamper-evidence. BUG-287 (S2 B-9) tracks re-implementation."
      - "Partitioning was dropped in v2 baseline — no O(1) retention via DROP PARTITION. BUG-288 (S2 B-9) tracks re-applying to v2."
      - "Trigger RAISE EXCEPTION bubbles to app layer — writeAuditLog's catch already swallows (per §9.6). Any code that catches this specific exception and masks it would be a bug; flagged as residual."
      - "down() re-grants UPDATE/DELETE — intentional for honest reversibility, but a down() in prod would re-open the hole. Plan §10 + CLAUDE.md §12: prod rollback requires CAB approval; forward-fix preferred."
    fix_registry_anchor: R-FIX-AUDIT-LOG-IMMUTABILITY
    regression_test: "apps/api/tests/integration/auditLogImmutability.test.ts (16 tests — Layer 1 HTTP surface, Layer 2 grant REVOKE + 2 new trigger defence-in-depth tests, Layer 3 PHI-read produces audit row)"
