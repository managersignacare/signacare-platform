    fixed_in: ["<pending-commit-hash>"]
    notes: |
      Added 'azure_keyvault' as a fourth SECRETS_BACKEND alongside
      env/json/file. New async entry point loadSecretsAsync() uses
      @azure/keyvault-secrets + @azure/identity (DefaultAzureCredential
      → managed-identity on App Service; env-var fallback for local
      dev; az-cli fallback for devs). Dynamic import keeps both SDKs
      out of the non-Azure boot path. SENSITIVE_KEYS map to
      kebab-lower vault secret names (JWT_ACCESS_SECRET → jwt-access-
      secret). SecretNotFound silently skipped; other errors throw.
      apps/api/src/index.ts now awaits loadSecretsAsync() BEFORE
      importing server.ts so process.env is populated before config.ts
      validates. Server.ts skips its own sync loadSecrets() call when
      backend is azure_keyvault. Bonus: documented .env.production.template
      with App Service @Microsoft.KeyVault(SecretUri=...) syntax.
      9 unit tests green, flake ×3 zero. Fix-registry anchors:
      R-FIX-BUG-366A-AZURE-KEYVAULT-BACKEND (+ 4 companions).

