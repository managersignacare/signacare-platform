    title: Ambient LLM prompt invites diagnostic inference
    root_cause: "Three prompt sites in apps/api/src/mcp/medicalScribe.ts instructed the LLM to emit structured diagnosis content: SCRIBE_PASS3_SYSTEM:334 ('Use ICD-10-AM codes where diagnosis is mentioned.'), SCRIBE_SOAP_FORMAT:363 ('Working diagnosis (ICD-10-AM code if stated)'), SCRIBE_MSE_FORMAT:410 ('[Working diagnosis and formulation]'). Even with 'if stated' qualifiers, these actively prompted the LLM to infer/produce ICD codes. File header (medicalScribe.ts:25-34) declares TGA non-device classification predicated on 'No Pass infers, diagnoses, recommends treatment' — the three prompts contradicted the header's declaration."
    accepted_pattern: "Rewrite three prompt sites with explicit 'NEVER infer' rule + permissive omit-OR-state language + synonym block ('likely', 'probable', 'implied', 'suggestive of'). Keep extractDiagnosis() regex + suggestedDiagnosis response field + hallucination-detector save-gate at llmRoutes.ts:540-561 as defence-in-depth."
    files_touched:
      - apps/api/src/mcp/medicalScribe.ts
      - apps/api/tests/unit/scribePromptDiscipline.test.ts
      - docs/audit-2026-04-19/bug-catalogue-v2.yaml
      - docs/audit-2026-04-19/bug-plans/BUG-034-scribe-no-diagnosis-inference.md
      - docs/fix-registry.md
    fix_summary: |
      SCRIBE_PASS3_SYSTEM Rule 9 replaced: 'Use ICD-10-AM codes where diagnosis
      is mentioned' → 'NEVER infer, generate, or suggest a diagnosis. Scribe
      is a transcription + formatting tool, not a diagnostic system. If the
      clinician explicitly stated a diagnosis or ICD-10-AM code verbatim,
      document that exact wording. If not stated, either omit the field or
      write "No explicit diagnosis documented". Do NOT use words like
      "likely", "probable", "implied", or "suggestive of".'
      SCRIBE_SOAP_FORMAT Assessment: 'Working diagnosis (ICD-10-AM code if
      stated)' → 'Clinician-stated clinical impression (verbatim or close
      paraphrase; NEVER infer a diagnosis the clinician did not explicitly
      state).'
      SCRIBE_MSE_FORMAT Clinical Impression: '[Working diagnosis and
      formulation]' → '[Clinician-stated formulation or impression only.
      Do NOT infer, generate, or suggest any diagnosis. Do NOT use words
      like likely / probable / implied / suggestive of.]'
      7 unit tests pin: (1/3/5) pre-fix strings absent, (2/4/6) new NEVER-infer
      rule present, (7) synonym-drift sweep over all three prompts after
      stripping NEGATIVE-rule prose.
    red_first_trace:
      pre_fix: "7 of 7 tests FAIL against current (pre-fix) prompts. Captured via vitest run before applying fix. Log in commit body."
      post_fix: "7 of 7 tests PASS."
    rejected_approaches:
