    root_cause: >
      OPEN as of 2026-04-20 audit. Originally catalogued mechanism
      (db() inside db.transaction) is NOT reproduced in current code:
      grep across apps/api/src/{features,jobs,middleware,shared,mcp,
      integrations} found zero violations; 3.5-min live observation
      (460 pool acquires, 460 releases, zero leak across 10 backend
      pids) confirmed no leak on observed HTTP + scheduler paths;
      SSE handler opens zero DB connections. Candidate mechanisms
      that COULD explain the 21h drain remain unverified: (A)
      LLM/scribe long handlers holding connections briefly under
      sustained load, (B) process-level TCP socket drift under cloud
      network conditions, (C) feature paths not exercised in audit.
    accepted_pattern: >
      Preventive rule (CLAUDE.md §2.1): never call db() inside a
      db.transaction(async (trx) => ...) body — always use trx. This
      rule is currently honoured in all 30+ transaction call sites;
      preserved as structural invariant, not as assertion about
      currently-broken code.
    mitigation_shipped: >
      Connection-level guardrails via shared appUserAfterCreate
      applied to BOTH appPool AND rawDbRead at apps/api/src/db/db.ts:87.
      Three-timeout triple: statement_timeout='30s' +
      idle_in_transaction_session_timeout='60s' + lock_timeout='5s'
      (lock_timeout added in BUG-187/264/366b combined commit).
      Bounds damage from any residual mechanism. The third timeout
      closes the deadlock-wait failure mode that the original pair
      could not bound.
    structural_fix_shipped: >
      BUG-264 accepted patterns are in place and verified: SSE route
      isolation in rlsMiddleware at apps/api/src/middleware/rlsMiddleware.ts:32
      (skips /events + text/event-stream), shared Redis subscriber in
      apps/api/src/features/events/sseRoutes.ts (one per process, not
      one per connection), 5-min SSE idle cleanup, heartbeat tear-down
      on write failure. BUG-264 root cause (SSE holding pool
      connections) structurally closed.
