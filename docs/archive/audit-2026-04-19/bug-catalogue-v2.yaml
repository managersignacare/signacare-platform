      - "Mandate 'Clinician did not state a specific diagnosis' as required output — medico-legally awkward; clinicians find it accusatory. Permissive 'omit OR state' preserves clinician agency (Critique 2.1)."
      - "Add golden-snapshot tests of full assembled prompt — fabricated-authority claim ('approved plan requires golden-snapshot'); grep returned 0 hits. String-level absent+present tests plus synonym-drift sweep achieve equivalent regression coverage at lower maintenance cost."
      - "Introduce per-model temperature + system-prompt discipline layer — out of scope; model-adherence measurement is BUG-132 / BUG-133 scope."
    open_risks:
      - "LLM compliance varies by model + inference config. Local Ollama models (Llama 3 / Mistral / Qwen) have weaker system-prompt adherence than frontier models; temperature > 0 amplifies deviation. Defence-in-depth via extractDiagnosis + hallucination detector at llmRoutes.ts:540-561 catches the residual."
      - "Free-text hallucination beyond ICD codes — an LLM emitting 'likely diagnosis of depression' without an ICD code evades extractDiagnosis regex and therefore evades the hallucination detector's ICD-based check. PROMPT test 7 guards against the INVITATION; no runtime free-text defence at present. BUG-132 / BUG-133 may extend."
