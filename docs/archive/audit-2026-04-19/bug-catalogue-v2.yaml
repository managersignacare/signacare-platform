  - bug_id: BUG-197
    severity: S0
    track: A
    wave: A-0
    state: fixed
    title: Redis maxmemory-policy default noeviction
    root_cause: >
      Redis default policy (noeviction) rejects writes when memory
      fills; default maxmemory=0 (unbounded) makes eventual memory
      pressure inevitable in a long-uptime process. Cache + BullMQ
      job state + session/idempotency/CSRF keys + SSE pub/sub buffers
      contend for the same memory — any write-rejection under pressure
      can halt clinical session creation, token issuance, job enqueue,
      or SSE publish.
    accepted_pattern: "infra/redis.conf (created) + docker-compose redis service command flags"
    files_touched:
      - "infra/redis.conf"
      - "docker-compose.yml"
      - "apps/api/tests/integration/redisEviction.int.test.ts"
      - "docs/runbooks/local-dev-redis-setup.md"
    mitigation_shipped: >
      maxmemory=512mb (dev/CI; production sized per Azure Cache capacity)
      + maxmemory-policy=allkeys-lru. Under pressure, oldest LRU keys
      are evicted to make room for new writes. Matches the policy in
      deploy/azure/modules/redis.bicep:50 (bicep-defined Azure Cache
      module; runtime production state not independently verified here).
    rejected_approaches:
      - "Increase maxmemory to 8GB without eviction policy (band-aid — delays failure mode)"
      - "Split into multiple Redis instances by concern (premature; single-instance works if bounded)"
      - "Policy=volatile-lru (diverges from Azure bicep allkeys-lru; reopens policy choice that catalogue had already locked)"
      - "Homebrew helper script (scripts/dev/configure-local-redis.sh) — creates second configuration branch; violates 'one way to do it' principal-engineer rule"
    open_risks:
      - "BullMQ queue state (DB0, DB2) has no TTL — allkeys-lru CAN evict under sustained pressure → clinical job lost (unsent HL7 order, unprocessed ambient note). Monitor per cloud-deploy doc §5.5."
      - "jwtBlacklist entries (DB3) CAN evict early under LRU pressure → revoked token briefly valid until its natural JWT expiry. Monitor evicted_keys counter vs token-revocation audit events."
      - "WebAuthn challenges (DB3) may evict → user retries authentication (annoyance, not harm)."
      - "Refresh-token family state (DB3) eviction mid-rotation force-logs-out a legitimate user. Interacts with BUG-220 RT family logic."
      - "SSE subscriber channels lose messages on eviction; may need Redis Streams for clinical alerts (cloud-deploy doc §5.5)."
      - "Multi-DB isolation: allkeys-lru operates across the whole instance, so pressure in DB1 can evict DB0 BullMQ state. No per-DB memory quota in Redis (cloud-deploy doc §10.6)."
      - "Persistence mode (AOF vs RDB) intentionally NOT specified — defaults from redis:7-alpine apply. Decide per Azure tier (cloud-deploy doc §10.5)."
    cross_references:
      - "BUG-049 (in-scope B-9): integration health framework must include Redis memory + eviction dashboard per cloud-deploy doc §5.5"
      - "BUG-145 (deferred ρ1): LLM/Whisper → BullMQ worker split reduces DB0/DB2 pressure, indirectly reduces BullMQ eviction risk"
      - "BUG-220 (A-2, shipped): refresh-token family invalidation must be robust to Redis eviction of blacklist state — verify interaction"
    follow_up_doc: "docs/audit-2026-04-19/follow-up-on-cloud-deploy.md"
    fix_registry_anchor: R-FIX-REDIS-ALLKEYS-LRU
    regression_test: "apps/api/tests/integration/redisEviction.int.test.ts > eviction > fills memory and evicts without REJECT"
    red_first_trace: "Captured /tmp/bug197-redfirst-fail.log (3 tests FAIL under noeviction+maxmemory=0) and /tmp/bug197-redfirst-pass.log (3 tests PASS post-fix). Attached to PR body."
