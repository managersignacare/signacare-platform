  - bug_id: BUG-282
    severity: S1
    track: A
    wave: A-4
    state: fixed
    title: Ollama /api/show digest integration + PHI-laden metadata migration (follow-up to BUG-037)
    root_cause: |
      [DEFERRED FROM A-3 PER PLAN §Sub-cluster F DEFERRAL CLAUSE — L3 REJECT + L4 BLOCK on initial attempt 2026-04-22. Items below are executable acceptance criteria, not a starting concept.] Part (1) /api/show digest integration was SHIPPED in A-3 via apps/api/src/mcp/ollamaModelRegistry.ts + apps/api/src/shared/recordLlmInteraction.ts (resolvedModelVersion format `name@sha256:digest`; metadata.versionSource='digest' set at call sites) — do NOT re-implement. A-4 scope is Part (2) only.
      Part (2) diagnosis: trainingPipeline historically stored full inputText + aiOutput in llm_interactions.metadata JSONB — PHI-laden and violates the BUG-037 'metadata must be derived-only' rule. BUG-037 redacted this down to lengths; but the underlying migration (move raw text to an encrypted prompts/outputs table with consent-gated access) is not yet done.
      A-3 attempt review verdict: L3 REJECT + L4 BLOCK + L5 PASS on 2026-04-22. Blocking items (a) encryptPhi silent-plaintext fallback in *_encrypted columns (Rule 3/6 violation); (b) missing production boot assertion on PHI_ENCRYPTION_KEY; (c) AMBIENT_NOTE_RECORDING_REVOKED → llm_prompts_outputs purge hook not wired; (d) encryption_status column + CHECK + export filter missing; (e) no transaction-rollback regression test. Absorbed into acceptance criteria below.
    accepted_pattern: |
      Executable spec with three invariants locked (no OR-options). Schema: llm_prompts_outputs (id uuid PK, llm_interaction_id uuid NOT NULL FK CASCADE, prompt_encrypted text NULL, output_encrypted text NULL, encryption_status varchar(16) NOT NULL DEFAULT 'ENCRYPTED' CHECK IN ('ENCRYPTED','FAILED','REVOKED'), consent_id uuid NULL FK scribe_consents SET NULL, created_at timestamptz NOT NULL). Ciphertext columns NULLABLE so FAILED path writes NULL (never plaintext). Own REVOKE UPDATE/DELETE/TRUNCATE from app_user + BEFORE UPDATE + BEFORE DELETE triggers invoking llm_prompts_outputs_prevent_mutation() (mirrors BUG-286). RLS policy joins llm_interactions.clinic_id.
      Encryption-failure policy: on encryptPhi failure OR PHI_ENCRYPTION_KEY absent at runtime — write ciphertext columns as NULL (NEVER plaintext), set encryption_status='FAILED', emit structured logger.error with {recordId, feature, reason} (no PHI), do NOT block parent llm_interactions INSERT (clinical-flow continuity). Training/export pipelines filter WHERE encryption_status='ENCRYPTED' AND consent_id IS NOT NULL AND <consent-permits-training> — machine-excluded, not convention-excluded.
      Boot assertion: assertProductionIntegrationsConfigured.ts NEW Check — production boot with PHI_ENCRYPTION_KEY missing OR length <64 hex chars → adds to missing[] → CrashLoopBackoff. Non-prod WARN+continue (consistent with BUG-295 STRICT pattern).
      Revocation policy: on AMBIENT_NOTE_RECORDING_REVOKED event (from BUG-274's shipped revoke endpoint) — soft-mark SYNCHRONOUSLY (set encryption_status='REVOKED' + write NULL to prompt_encrypted+output_encrypted in the same transaction as the consent revoke; use a SECURITY DEFINER SQL helper llm_prompts_outputs_mark_revoked(consentId uuid) authored in BUG-282's migration to bypass the append-only trigger for this one documented path). Async hard-purge owned by BUG-317 retention job — not BUG-282's scope. Soft-mark is O(1) per row via index on consent_id; immediate hard-DELETE rejected because it (a) weakens append-only forensic posture and (b) blocks patient-initiated revoke request on large consent_id fan-out.
      Transactionality: recordLlmInteraction with promptText+outputText writes both tables in a single dbAdmin.transaction. Encryption-failure writes a FAILED row inside the same transaction (never rolls back parent llm_interactions INSERT).
      Tests (≥12 required): T1 legacy single-INSERT; T2 new both-tables atomic; T3 transaction rollback — non-encryption failure (FK violation) rolls back BOTH; T4 encryption_status='ENCRYPTED' on success; T5 encryption_status='FAILED' when PHI_ENCRYPTION_KEY absent; T6 UPDATE raises; T7 DELETE raises; T8 CASCADE FK via information_schema; T9 RLS cross-tenant SELECT returns zero; T10 export filter excludes FAILED+NULL consent_id; T11 boot refuses production without PHI_ENCRYPTION_KEY; T12 revocation soft-mark — fire AMBIENT_NOTE_RECORDING_REVOKED → llm_prompts_outputs rows with that consent_id have encryption_status='REVOKED'+ciphertext NULL in same transaction.
      Shipped-code surfaces this bug extends (NOT open dependencies): apps/api/src/shared/phiEncryption.ts (BUG-216 shipped; BUG-282 adds boot-assertion + removes plaintext fallback); apps/api/src/features/llm/scribeRoutes.ts consent revoke endpoint (BUG-274 shipped c898da6; BUG-282 wires the soft-mark helper call).
    files_touched: []
    rejected_approaches:
      - "Ship with silent plaintext fallback in *_encrypted column — L3+L4 blocked as Rule 3/6 violation. Plaintext NEVER enters the *_encrypted columns; FAILED rows write NULL instead."
      - "Immediate hard-DELETE on AMBIENT_NOTE_RECORDING_REVOKED — bypasses append-only forensic posture + blocks revoke request. Soft-mark + async BUG-317 purge is the canonical pattern."
