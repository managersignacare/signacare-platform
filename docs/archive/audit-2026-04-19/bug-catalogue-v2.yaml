    root_cause: "apps/api/src/mcp/scribeStreaming.ts ran the processAmbientAudio pipeline over a WebSocket connection with NO upgrade-time auth, NO consent check, and NO patient-relationship check. Client-supplied staffId / clinicId from the first 'start' message were trusted verbatim (line 191-192). Any WS client could impersonate any clinic's clinician on any patient and stream audio to Whisper + LLM. Though today the WS handler does not persist to clinical_notes, (a) processAmbientAudio still runs against unconsented audio (OAIC APP 3.1 breach), and (b) any future persistence wiring would silently enable the full attack with no code-review friction because no gate exists to remove."
