  - bug_id: BUG-356c
    title: "audit_log actorId for SESSION_REVOKED_BY_STATE_CHANGE is subject, not acting admin"
    severity: S3
    track: A
    wave: "Phase-0.5-follow-up"
    state: open
    blocked_by: [BUG-356]
    discovered_by: "L4 re-review on BUG-356 absorb 2026-04-23"
    discovered_at: "2026-04-23"
    notes: |
      staffService.updateStaff writes the audit row via writeAuditLog({
      actorId: id, ... }) where `id` is the SUBJECT of the revocation,
      not the admin who performed the demotion. Rule 5 (traceability
      to human clinician) demands actorId = the acting admin. Current
      workaround in code: commented as incremental-adoption debt pending
      AuthContext-first migration per §13. Fix: thread AuthContext
      through updateStaff(auth, ...) signature. Small change — 1 commit
      when the service is next touched, or when the §13 migration wave
      reaches this file.

