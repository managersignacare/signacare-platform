  - bug_id: BUG-264
    severity: S1
    track: A
    wave: A-1
    state: fixed
    fixed_at: "2026-04-24"
    fixed_in: ["<pending-commit-hash-bug-187-264-366b>"]
    title: DB pool exhaustion reproduces under Playwright load (BUG-187 root cause materialised)
    root_cause: "During BUG-032 fix work (2026-04-20), the dev API log surfaced 'DB pool pressure detected' warnings with used:50, free:0, pending:3 — the exact mechanism BUG-187 catalogued. Attributable to SSE streams holding app_user pool connections for long-duration server-sent-event pushes: each authenticated page opens SSE subscriptions (session-warning, notifications), and the pool can't reclaim until the client disconnects. Playwright-generated page-churn created enough concurrent SSE connections to exhaust the 50-connection pool."
    accepted_pattern: "Either (a) move SSE streams to a dedicated connection pool configured for long-hold (e.g. minimum-idle + periodic ping-with-reclaim), (b) move SSE to a separate Express route that uses no DB connection, or (c) shorten SSE heartbeat interval and forcibly disconnect idle clients. The BUG-187 mitigation (statement_timeout + idle_in_transaction_session_timeout) does NOT fix this because SSE connections are explicitly long-lived and not in-transaction."
    fix_shipped: |
      Three layered fixes in place (accepted pattern (b) + (c) + BUG-187 triple):
      (b) rlsMiddleware.ts:32 skips `/events` and `text/event-stream` paths → SSE does NOT open a DB transaction. sseRoutes.ts also does NOT query DB directly — all event delivery is via Redis pub/sub via a single shared IORedis subscriber (one per process, not one per connection).
      (c) sseRoutes.ts has 30s heartbeat + 5-min idle cleanup + tear-down on write failure. Half-open sockets get reaped.
      BUG-187 triple (statement_timeout=30s + idle_in_transaction_session_timeout=60s + lock_timeout=5s) covers HTTP request-path pool pressure on top.
      BUG-366b adds Azure-informed PgBouncer pool default (20 per worker) replacing the old 5 — removes the per-pod bottleneck under Playwright burst load.
    files_touched: []
    rejected_approaches:
      - "Raise pool max from 50 to 200 — linear-scale band-aid, doesn't address the fundamental long-hold leak"
      - "Accept pool pressure as normal — blocks auth endpoints under load, the exact failure mode BUG-187 ships against"
    open_risks:
      - "Production canary will likely reproduce this under real clinician load before BUG-187's monitoring detects it"
      - "Requires a routing decision between (a)/(b)/(c) — see docs/audit-2026-04-19/follow-up-on-cloud-deploy.md once BUG-264 is scheduled"
