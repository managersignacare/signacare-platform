# ─────────────────────────────────────────────────────────────────────────────
# Signacare EMR — Azure deploy (S8.1)
# ─────────────────────────────────────────────────────────────────────────────
#
# Builds and pushes the apps/api + apps/web Docker images to the environment's
# Azure Container Registry, then deploys them to the corresponding App Service
# site. Uses slot swaps for prod (blue-green) and direct deploy for staging.
#
# Triggers:
#   - Manual workflow_dispatch with an environment input (staging / prod).
#     Prod deploys require the `prod-deploys` environment in GitHub settings,
#     which gates on reviewer approval.
#   - push to main → auto-deploy to staging.
#
# Required repository secrets:
#   AZURE_CREDENTIALS           Service principal JSON for az login
#                               (Contributor + Key Vault Secrets User + ACR push)
#   AZURE_SUBSCRIPTION_ID       Subscription to deploy into
#   ACR_NAME_STAGING            Registry name, e.g. signacarecrstaging
#   ACR_NAME_PROD               Registry name, e.g. signacarecrprod
#
# The Bicep template is NOT run from this workflow — infrastructure changes
# go through deploy/azure/deploy.sh so infra diffs are visible in a PR review
# before any az deployment sub create executes. This workflow only moves
# application code onto already-provisioned infrastructure.
#
# Standards: ISO 27001 A.8.31 (separation of environments), A.8.30 (outsourced
# development), SOC 2 CC8 (change management).

name: Azure Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod
      swap_after_deploy:
        description: 'For prod only — swap staging slot into production after smoke tests pass'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'Dockerfile*'

concurrency:
  # One deploy per environment at a time. Queued runs override older ones
  # so we never ship an older image after a newer one has started rolling.
  group: azure-deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  NAME_PREFIX: signacare

jobs:
  build-and-push:
    name: Build + push images
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      env_name: ${{ steps.meta.outputs.env_name }}
      acr_name: ${{ steps.meta.outputs.acr_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          API_URL="https://${{ env.NAME_PREFIX }}-api-${ENV}.azurewebsites.net/api"
          echo "env_name=$ENV" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          # Phase R3 dev/test deploy support (2026-04-30): per-tier ACR
          # so dev/test images cannot be confused with staging or prod
          # registry contents (separation of environments per ISO 27001
          # A.8.31). ACR_NAME_DEV must be configured as a repo secret
          # before first dev deploy.
          if [[ "$ENV" == "prod" ]]; then
            echo "acr_name=${{ secrets.ACR_NAME_PROD }}" >> "$GITHUB_OUTPUT"
          elif [[ "$ENV" == "dev" ]]; then
            echo "acr_name=${{ secrets.ACR_NAME_DEV }}" >> "$GITHUB_OUTPUT"
          else
            echo "acr_name=${{ secrets.ACR_NAME_STAGING }}" >> "$GITHUB_OUTPUT"
          fi
          # Tag format: short SHA + UTC timestamp. Human-readable + unique.
          TAG="$(git rev-parse --short HEAD)-$(date -u +%Y%m%d%H%M%S)"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ACR login
        run: az acr login --name "${{ steps.meta.outputs.acr_name }}"

      - name: Build + push apps/api image
        run: |
          set -euo pipefail
          IMAGE="${{ steps.meta.outputs.acr_name }}.azurecr.io/signacare-api:${{ steps.meta.outputs.image_tag }}"
          docker buildx build \
            --platform linux/amd64 \
            -f apps/api/Dockerfile \
            -t "$IMAGE" \
            -t "${{ steps.meta.outputs.acr_name }}.azurecr.io/signacare-api:latest" \
            --push .

      - name: Build + push apps/web image
        run: |
          set -euo pipefail
          IMAGE="${{ steps.meta.outputs.acr_name }}.azurecr.io/signacare-web:${{ steps.meta.outputs.image_tag }}"
          docker buildx build \
            --platform linux/amd64 \
            -f apps/web/Dockerfile \
            --build-arg VITE_API_URL="${{ steps.meta.outputs.api_url }}" \
            -t "$IMAGE" \
            -t "${{ steps.meta.outputs.acr_name }}.azurecr.io/signacare-web:latest" \
            --push .

  deploy:
    name: Deploy to App Service
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ needs.build-and-push.outputs.env_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Compute site names
        id: sites
        run: |
          ENV="${{ needs.build-and-push.outputs.env_name }}"
          RG="${{ env.NAME_PREFIX }}-rg-$ENV"
          echo "rg=$RG" >> "$GITHUB_OUTPUT"
          echo "api_site=${{ env.NAME_PREFIX }}-api-$ENV" >> "$GITHUB_OUTPUT"
          echo "web_site=${{ env.NAME_PREFIX }}-web-$ENV" >> "$GITHUB_OUTPUT"
          if [[ "$ENV" == "prod" ]]; then
            echo "slot=staging" >> "$GITHUB_OUTPUT"
          else
            echo "slot=" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy API image to App Service
        run: |
          set -euo pipefail
          IMAGE="${{ needs.build-and-push.outputs.acr_name }}.azurecr.io/signacare-api:${{ needs.build-and-push.outputs.image_tag }}"
          SLOT_FLAG=""
          if [[ -n "${{ steps.sites.outputs.slot }}" ]]; then
            SLOT_FLAG="--slot ${{ steps.sites.outputs.slot }}"
          fi
          az webapp config container set \
            --name "${{ steps.sites.outputs.api_site }}" \
            --resource-group "${{ steps.sites.outputs.rg }}" \
            $SLOT_FLAG \
            --docker-custom-image-name "$IMAGE" \
            --docker-registry-server-url "https://${{ needs.build-and-push.outputs.acr_name }}.azurecr.io"

      - name: Deploy Web image to App Service
        run: |
          set -euo pipefail
          IMAGE="${{ needs.build-and-push.outputs.acr_name }}.azurecr.io/signacare-web:${{ needs.build-and-push.outputs.image_tag }}"
          SLOT_FLAG=""
          if [[ -n "${{ steps.sites.outputs.slot }}" ]]; then
            SLOT_FLAG="--slot ${{ steps.sites.outputs.slot }}"
          fi
          az webapp config container set \
            --name "${{ steps.sites.outputs.web_site }}" \
            --resource-group "${{ steps.sites.outputs.rg }}" \
            $SLOT_FLAG \
            --docker-custom-image-name "$IMAGE" \
            --docker-registry-server-url "https://${{ needs.build-and-push.outputs.acr_name }}.azurecr.io"

      - name: Wait for containers to come up (120s grace)
        run: sleep 120

      - name: Smoke test
        run: |
          set -euo pipefail
          chmod +x deploy/azure/post-deploy-smoke.sh
          if [[ -n "${{ steps.sites.outputs.slot }}" ]]; then
            # Prod: smoke-test the staging slot before swap.
            export NAME_PREFIX="${{ env.NAME_PREFIX }}"
            # Slot FQDN pattern: <site>-<slot>.azurewebsites.net
            API="https://${{ steps.sites.outputs.api_site }}-${{ steps.sites.outputs.slot }}.azurewebsites.net"
            WEB="https://${{ steps.sites.outputs.web_site }}-${{ steps.sites.outputs.slot }}.azurewebsites.net"
            curl -fsS "$API/health" >/dev/null
            curl -fsS "$API/ready" >/dev/null
            curl -fsS "$WEB/" >/dev/null
            echo "Slot smoke test passed."
          else
            ENV="${{ needs.build-and-push.outputs.env_name }}" bash deploy/azure/post-deploy-smoke.sh
          fi

      - name: Swap slot to production (prod only, gated)
        if: ${{ needs.build-and-push.outputs.env_name == 'prod' && github.event.inputs.swap_after_deploy == 'true' }}
        run: |
          az webapp deployment slot swap \
            --name "${{ steps.sites.outputs.api_site }}" \
            --resource-group "${{ steps.sites.outputs.rg }}" \
            --slot "${{ steps.sites.outputs.slot }}" \
            --target-slot production
          az webapp deployment slot swap \
            --name "${{ steps.sites.outputs.web_site }}" \
            --resource-group "${{ steps.sites.outputs.rg }}" \
            --slot "${{ steps.sites.outputs.slot }}" \
            --target-slot production

      - name: Post-swap smoke test (prod only)
        if: ${{ needs.build-and-push.outputs.env_name == 'prod' && github.event.inputs.swap_after_deploy == 'true' }}
        run: |
          ENV=prod NAME_PREFIX=${{ env.NAME_PREFIX }} bash deploy/azure/post-deploy-smoke.sh

      - name: Slack notify on success
        if: ${{ success() }}
        env:
          SLACK_WEBHOOK_OPS: ${{ secrets.SLACK_WEBHOOK_OPS }}
        run: |
          if [[ -n "${SLACK_WEBHOOK_OPS:-}" ]]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\":rocket: Signacare deploy to ${{ needs.build-and-push.outputs.env_name }} succeeded — ${{ needs.build-and-push.outputs.image_tag }}\"}" \
              "$SLACK_WEBHOOK_OPS" || true
          fi

      - name: Slack notify on failure
        if: ${{ failure() }}
        env:
          SLACK_WEBHOOK_OPS: ${{ secrets.SLACK_WEBHOOK_OPS }}
        run: |
          if [[ -n "${SLACK_WEBHOOK_OPS:-}" ]]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\":rotating_light: Signacare deploy to ${{ needs.build-and-push.outputs.env_name }} FAILED — run ${{ github.run_id }}\"}" \
              "$SLACK_WEBHOOK_OPS" || true
          fi
