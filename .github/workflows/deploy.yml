# ──────────────────────────────────────────────────────────────────────────────
# Signacare EMR — Deploy Pipeline
# ──────────────────────────────────────────────────────────────────────────────
#
# Category 11: the 10-job sequenced deploy pipeline from the Gold Standard
# test-suite prompt. Triggered manually (workflow_dispatch) or on a release
# tag push. Runs through:
#
#   1. code-quality      — lint + typecheck + depcruise + knip
#   2. unit-tests        — vitest (reuses ci.yml job via workflow reuse)
#   3. integration-tests — supertest + Postgres service container
#   4. e2e-tests         — Playwright chromium
#   5. security-scan     — Trivy container scan + npm audit
#   6. docker-build      — build + tag + push to registry
#   7. deploy-staging    — kubectl rollout to staging AKS
#   8. load-test-staging — k6 load.js against staging, enforced SLAs
#   9. compliance-check  — FHIR + audit coverage + DR restore drill
#   10. deploy-production — MANUAL approval gate + kubectl rollout
#
# Infrastructure notes:
#   - Jobs 7, 8, 9, 10 need real cluster endpoints + secrets. Until the
#     AKS/EKS cluster is provisioned, those jobs run in "dry-run" mode —
#     they print the commands they WOULD run but don't execute them.
#     Flip DRY_RUN=false in the job env when the cluster is ready.
#   - The manual approval gate on deploy-production uses a GitHub
#     Environment called `production` with required reviewers. Configure
#     reviewers in Settings → Environments → production.
#
# Standard satisfied: ISO 25010 Reliability + Maintainability, ACHS
#                     Standard 1 (clinical software change control),
#                     IEC 62304 §5.6 (software release).
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: deploy-${{ github.event.inputs.target || 'release' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  # Flip to false when the cluster is provisioned and secrets are set.
  DRY_RUN: 'true'

jobs:
  # ── 1. Code Quality ─────────────────────────────────────────────────────────
  code-quality:
    name: '1. Code Quality (lint + typecheck + arch)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci --workspaces --include-workspace-root
      - run: npm run lint
      - name: 'Typecheck: packages/shared'
        run: npx tsc --noEmit --project packages/shared/tsconfig.json
      - name: 'Typecheck: apps/api'
        run: npx tsc --noEmit --project apps/api/tsconfig.json
      - name: 'Typecheck: apps/web'
        run: npx tsc --noEmit --project apps/web/tsconfig.json
      - run: npm run arch:depcruise
      - name: Fix registry + naming guards
        run: |
          bash .github/scripts/check-fix-registry.sh
          bash .github/scripts/check-naming-conventions.sh

  # ── 2. Unit Tests ───────────────────────────────────────────────────────────
  unit-tests:
    name: '2. Unit Tests (vitest)'
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci --workspaces --include-workspace-root
      - name: Run vitest (apps/api)
        run: npm test --workspace=apps/api
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-${{ github.run_id }}
          path: apps/api/coverage/
          if-no-files-found: ignore
          retention-days: 30

  # ── 3. Integration Tests ────────────────────────────────────────────────────
  integration-tests:
    name: '3. Integration Tests (supertest + Postgres)'
    runs-on: ubuntu-latest
    needs: [unit-tests]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: signacare_test
          POSTGRES_USER: signacare
          POSTGRES_PASSWORD: signacare_test_pw
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci --workspaces --include-workspace-root
      - name: Run migrations against test DB
        run: npm run migrate:dev --workspace=apps/api
        env:
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: signacare
          DB_PASSWORD: signacare_test_pw
          DB_NAME: signacare_test
          NODE_ENV: test
      - name: Run integration tests
        run: npm run test:integration --workspace=apps/api
        env:
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: signacare
          DB_PASSWORD: signacare_test_pw
          DB_NAME: signacare_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-test-access-secret-minimum-32-characters
          JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-characters
          NODE_ENV: test

  # ── 4. E2E Tests (Playwright) ───────────────────────────────────────────────
  e2e-tests:
    name: '4. E2E Tests (Playwright)'
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci --workspaces --include-workspace-root
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright e2e
        run: npm run test:e2e
        env:
          NODE_ENV: test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 30

  # ── 5. Security Scan (Trivy + npm audit) ───────────────────────────────────
  security-scan:
    name: '5. Security Scan (Trivy + npm audit)'
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci --workspaces --include-workspace-root
      - name: npm audit (fail on HIGH or CRITICAL)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true
      - name: Build API image for scanning
        run: docker build -t signacare-api:scan apps/api
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'signacare-api:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      - name: Upload Trivy SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ github.run_id }}
          path: trivy-results.sarif
          if-no-files-found: ignore

  # ── 6. Docker Build + Push ──────────────────────────────────────────────────
  docker-build:
    name: '6. Docker Build + Push'
    runs-on: ubuntu-latest
    needs: [e2e-tests, security-scan]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        name: Compute image tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="${{ github.ref_name }}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building image with tag: ${TAG}"
      - name: Build API image
        run: docker build -t signacare-api:${{ steps.meta.outputs.tag }} apps/api
      - name: Build Web image
        run: docker build -t signacare-web:${{ steps.meta.outputs.tag }} apps/web
      - name: Push to registry (dry-run today)
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "[dry-run] docker push signacare-api:${{ steps.meta.outputs.tag }}"
            echo "[dry-run] docker push signacare-web:${{ steps.meta.outputs.tag }}"
          else
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login \
              ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USER }} --password-stdin
            docker tag signacare-api:${{ steps.meta.outputs.tag }} \
              ${{ secrets.REGISTRY_URL }}/signacare-api:${{ steps.meta.outputs.tag }}
            docker push ${{ secrets.REGISTRY_URL }}/signacare-api:${{ steps.meta.outputs.tag }}
          fi

  # ── 7. Deploy Staging ───────────────────────────────────────────────────────
  deploy-staging:
    name: '7. Deploy to Staging'
    runs-on: ubuntu-latest
    needs: [docker-build]
    environment:
      name: staging
      url: https://staging.signacare.au
    steps:
      - uses: actions/checkout@v4
      - name: kubectl rollout (dry-run today)
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "[dry-run] kubectl set image deployment/signacare-api \\"
            echo "             signacare-api=${{ needs.docker-build.outputs.image_tag }} \\"
            echo "             -n signacare-staging"
            echo "[dry-run] kubectl rollout status deployment/signacare-api -n signacare-staging --timeout=5m"
          else
            echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
            export KUBECONFIG=kubeconfig
            kubectl set image deployment/signacare-api \
              signacare-api=${{ needs.docker-build.outputs.image_tag }} \
              -n signacare-staging
            kubectl rollout status deployment/signacare-api -n signacare-staging --timeout=5m
          fi
      - name: Post-deploy smoke test
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "[dry-run] curl https://staging.signacare.au/health"
          else
            curl --fail --retry 5 --retry-delay 5 https://staging.signacare.au/health
          fi

  # ── 8. Load Test Staging (k6) ──────────────────────────────────────────────
  load-test-staging:
    name: '8. Load Test Staging (k6)'
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Run k6 load scenario against staging
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "[dry-run] k6 run --summary-export=k6-summary.json scripts/k6/load.js"
          else
            STAGING_URL=https://staging.signacare.au \
              k6 run --summary-export=k6-summary.json scripts/k6/load.js
          fi
      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary-${{ github.run_id }}
          path: k6-summary.json
          if-no-files-found: ignore

  # ── 9. Compliance Check ────────────────────────────────────────────────────
  compliance-check:
    name: '9. Compliance Check (FHIR + DR drill)'
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci --workspaces --include-workspace-root
      - name: Run compliance integration suite against staging
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "[dry-run] TEST_API_URL=https://staging.signacare.au/api/v1 \\"
            echo "             npx vitest run tests/integration/complianceCoverage.test.ts \\"
            echo "             tests/integration/auditLogImmutability.test.ts"
          else
            cd apps/api && \
              TEST_API_URL=https://staging.signacare.au/api/v1 \
              npx vitest run --config vitest.integration.config.ts \
                tests/integration/complianceCoverage.test.ts \
                tests/integration/auditLogImmutability.test.ts
          fi
      - name: Run DR restore drill against staging
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "[dry-run] DB_HOST=staging-db.signacare.au bash scripts/dr/restore-drill.sh"
          else
            DB_HOST=${{ secrets.STAGING_DB_HOST }} \
            DB_USER=${{ secrets.STAGING_DB_DRILL_USER }} \
            DB_PASSWORD=${{ secrets.STAGING_DB_DRILL_PASSWORD }} \
            DB_NAME=${{ secrets.STAGING_DB_NAME }} \
              bash scripts/dr/restore-drill.sh
          fi

  # ── 10. Deploy Production (MANUAL approval) ────────────────────────────────
  deploy-production:
    name: '10. Deploy to Production'
    runs-on: ubuntu-latest
    needs: [load-test-staging, compliance-check]
    # GitHub Environments supports required reviewers. Configure in
    # Settings → Environments → production → "Required reviewers".
    environment:
      name: production
      url: https://signacare.au
    steps:
      - uses: actions/checkout@v4
      - name: kubectl rollout to production (dry-run today)
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "[dry-run] kubectl set image deployment/signacare-api \\"
            echo "             signacare-api=${{ needs.docker-build.outputs.image_tag }} \\"
            echo "             -n signacare-prod"
            echo "[dry-run] kubectl rollout status deployment/signacare-api -n signacare-prod --timeout=10m"
          else
            echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > kubeconfig
            export KUBECONFIG=kubeconfig
            kubectl set image deployment/signacare-api \
              signacare-api=${{ needs.docker-build.outputs.image_tag }} \
              -n signacare-prod
            kubectl rollout status deployment/signacare-api -n signacare-prod --timeout=10m
          fi
      - name: Post-deploy smoke test
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "[dry-run] curl https://signacare.au/health"
          else
            curl --fail --retry 10 --retry-delay 5 https://signacare.au/health
          fi
      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "${DRY_RUN}" = "true" ]; then
            echo "[dry-run] slack notify: deploy to prod ${STATUS} for ${{ github.sha }}"
          else
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"Production deploy ${STATUS}: ${{ github.sha }} by ${{ github.actor }}\"}" \
              ${{ secrets.SLACK_WEBHOOK_DEPLOY }}
          fi
