      - name: Run check-no-hardcoded-column-lists
        run: npm run guard:no-hardcoded-column-lists

  opt-locking-new-tables-guard:
    name: Optimistic Locking New-Tables Guard (PR-R1-12; CLAUDE.md §1.6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install root deps (for tsx)
        run: npm ci --ignore-scripts
      - name: Run check-opt-locking-new-tables
        run: npm run guard:opt-locking-new-tables

  fix-registry-decisiveness-guard:
    name: Fix-Registry Decisiveness Guard (PR-R1-7; CLAUDE.md §9.5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full git history needed for git grep tracking
      - name: Install root deps (for tsx)
        run: npm ci --ignore-scripts
      - name: Run check-fix-registry-decisiveness
        run: npm run guard:fix-registry-decisiveness

  atomic-catalogue-flip-guard:
    name: Atomic Catalogue Flip Guard (PR-R1-8; feedback_atomic_catalogue_flip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed to inspect PR commit range
      - name: Install root deps (for tsx)
        run: npm ci --ignore-scripts
      - name: Run check-atomic-catalogue-flip on PR commits
        run: |
          # On a PR, inspect every commit since the actual merge-base
          # with the target branch. Cycle-2 absorb of L3 finding A3:
          # cycle-1 used `pull_request.base.sha` which is the BASE-AT-
          # PR-OPEN, NOT the merge-base — they diverge after a force-
          # push rebase. `git merge-base` computes the true common
          # ancestor so the range is precise regardless of rebase.
          # On main pushes (post-merge), inspect the HEAD commit only.
          if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
            git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=0 || true
            MERGE_BASE=$(git merge-base "$BASE_REF" HEAD)
            RANGE="$MERGE_BASE..HEAD"
          else
            RANGE="HEAD~1..HEAD"
          fi
          echo "Inspecting commit range: $RANGE"
          npm run guard:atomic-catalogue-flip -- --commits "$RANGE"

  # ── 11. Architecture Quality (Category 7) ────────────────────────────────────
  # Enforces the layering rules in .dependency-cruiser.cjs:
  #   - no circular dependencies across apps/api/src
  #   - no route-to-route imports (except the Express sub-router allowlist)
  #   - no service-to-route imports
  #   - no src-to-test imports
  # knip is also installed and can be run manually via `pnpm arch:knip`, but
  # it emits findings as warnings today (see knip.json) and is not gated here
  # until the existing unused-export backlog is triaged.
  arch-quality:
    name: Architecture Quality (depcruise)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root
      - name: Run dependency-cruiser validation
        run: npm run arch:depcruise

  repo-architecture-contract-guard:
    name: Repo Architecture Contract Guard
    runs-on: ubuntu-latest
    needs: [arch-quality, generated-api-contracts-guard]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root
      - name: Run repo architecture contract
        run: npm run guard:repo-architecture-contract

  # ── 12. Accessibility Check ───────────────────────────────────────────────────
  # WCAG 2.1 AA compliance check — healthcare apps must be accessible (DDA
  # 1992, NSQHS Std 2, WCAG 2.2 AA).
  #
  # Two layers:
  #   1. Static: ARIA / landmark / skip-nav coverage thresholds. Fast — runs
  #      in seconds — catches regressions in accessibility markup density.
  #   2. Dynamic: @axe-core/playwright runs against /login, patient list, and
  #      the three most-used patient-detail tabs (Summary, Clinical Notes,
  #      Medications). Asserts zero critical or serious violations.
  #
  # GAP-01 closure progress (2026-04-11): axe-core in CI across 3 surfaces;
  # full WCAG 2.2 sprint + MUI contrast audit + VPAT still pending (see
  # docs/accessibility/VPAT.md).
  a11y:
    name: WCAG Accessibility Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: signacare_owner
          POSTGRES_PASSWORD: signacare_ci_test_pw
          POSTGRES_DB: signacaredb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U signacare_owner -d signacaredb_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: signacare_owner
      DB_PASSWORD: signacare_ci_test_pw
      DB_NAME: signacaredb_test
      DB_SSL: 'false'
      DB_APP_USER: app_user
      DB_APP_PASSWORD: signacare_ci_app_pw
      JWT_ACCESS_SECRET: ci-test-access-secret-64-char-hex-0123456789abcdef0123456789abcdef
      JWT_REFRESH_SECRET: ci-test-refresh-secret-64-char-hex-0123456789abcdef0123456789abcdef
      JWT_ACCESS_TTL_MINUTES: '60'
      JWT_REFRESH_TTL_DAYS: '7'
      PHI_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      BLIND_INDEX_KEY: fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210
      SESSION_SECRET: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
      REDIS_URL: redis://localhost:6379
      CORS_ORIGIN: http://localhost:5173
      PORT: '4000'
      CALENDAR_ICAL_SECRET: ffeeddccbbaa99887766554433221100ffeeddccbbaa99887766554433221100
      VITE_API_URL: /api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root
      - name: Ensure runtime DB role exists
        run: bash scripts/ci/ensure-postgres-runtime-role.sh
      - name: Apply migrations
        run: npm run migrate:dev --workspace=apps/api
      - name: Seed e2e fixtures (admin@signacare.local)
        run: npm run seed:e2e-fixtures --workspace=apps/api
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Static ARIA coverage thresholds
        run: |
          set -euo pipefail
          ARIA=$(grep -rn "aria-\|role=" apps/web/src/ --include="*.tsx" | wc -l | xargs)
          LANDMARKS=$(grep -rn 'role="main"\|role="navigation"\|role="banner"\|role="contentinfo"' apps/web/src/ --include="*.tsx" | wc -l | xargs)
          SKIP_NAV=$(grep -rn "skip.*main\|skip.*content\|skip.*nav" apps/web/src/ --include="*.tsx" | wc -l | xargs)
          echo "ARIA attributes: $ARIA (target: 50+)"
          echo "Landmark roles: $LANDMARKS (target: 4+)"
          echo "Skip navigation: $SKIP_NAV (target: 1+)"
          if [ "$ARIA" -lt 50 ] || [ "$LANDMARKS" -lt 4 ] || [ "$SKIP_NAV" -lt 1 ]; then
            echo "::error::ARIA coverage below threshold"
            exit 1
          fi
      - name: MUI theme contrast audit (WCAG SC 1.4.3 / 1.4.11)
        # Enforces WCAG 2.1 AA contrast on every palette token pair across
        # all 8 shipped themes. Fails the build on any AA violation.
        run: npm run a11y:contrast
      - name: A11y baseline allowlist integrity
        run: npm run guard:a11y-baseline-allowlist
      - name: A11y dry-run truthfulness guard
        env:
          CI_A11Y_DRYRUN: ${{ vars.CI_A11Y_DRYRUN || 'false' }}
          GITHUB_REF_PROTECTED: ${{ github.ref_protected }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: npm run guard:a11y-ci-no-dryrun
      - name: Dynamic axe-core e2e scan
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: a11y-playwright-report.json
        run: |
          set -euo pipefail
          PLAYWRIGHT_EXIT=0
          npx playwright test --project=chromium e2e/accessibility/ --reporter=list,json || PLAYWRIGHT_EXIT=$?
          npm run guard:a11y-playwright-report -- a11y-playwright-report.json
          exit "$PLAYWRIGHT_EXIT"
      - name: Upload axe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report-${{ github.run_id }}
          path: |
            a11y-playwright-report.json
            playwright-report/
            test-results/
          retention-days: 30
          if-no-files-found: ignore

  # ── Gate: block merge if any required job fails ──────────────────────────────
  # This is the single status check configured as "required" in GitHub branch
  # protection rules. It aggregates all job results so we only need one rule.
  #
  # Phase 0.7.5 Commit 10: expanded to include every CI guard + e2e-smoke.
  # Previously only a subset was wired; the rest ran as informational checks
  # that did not block merge. CLAUDE.md §11 L5 — E2E smoke must block merge
  # (highest-ROI CI improvement per the Phase 0.7.5 plan).
  ci-gate:
    name: CI Gate (required)
    runs-on: ubuntu-latest
    needs:
      - affected-workspaces
      - lint
      - typecheck
      - test-unit
      - test-integration
      - e2e-smoke
      - build
      - security
      - gitleaks-guard
      - sast
      - sbom
      - fix-registry-guard
      - atomic-flip-guard
      - file-size-guard
      - claude-discipline-guard
      - repo-hygiene-guards
      - commit-claims-pr-guard
      - pr-template-compliance-guard
      - naming-conventions-guard
      - no-telecom-guard
      - acs-callers-guard
      - no-stray-db-names-guard
      - dead-mount-guard
      - query-key-factories-guard
      - no-duplicate-api-types-guard
      - frontend-url-guard
      - integration-url-guard
      - safety-route-coverage-guard
      - c3-noncritical-backfill-guard
      - c3-coverage-artifact
      - c3-coverage-artifact-guard
      - fire-and-forget-guard
      - silent-catches-guard
      - no-orphan-migrations-guard
      - row-iface-drift-guard
      - migration-convention-guard
      - snapshot-freshness-guard
      - code-columns-guard
      - fk-aware-joins-guard
      - response-shape-validated-guard
      - service-auth-context-guard
      - migration-rollback-discipline-guard
      - jsonb-extraction-guard
      - trx-not-db-inside-transaction-guard
      - bugs-remaining-uniqueness-guard
      - mapper-naming-guard
      - zod-schema-parity-guard
      - scaffold-extension-guard
      - generator-no-diff-guard
      - generated-api-contracts-guard
      - no-column-ddl-in-raw-sql-guard
      - no-hardcoded-column-lists-guard
      - opt-locking-new-tables-guard
      - fix-registry-decisiveness-guard
      - atomic-catalogue-flip-guard
      - patient-app-ownership-guard
      - arch-quality
      - repo-architecture-contract-guard
      - a11y
    if: always()
    steps:
      - name: Evaluate job results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed. Blocking merge."
            echo ""
            echo "Failed jobs:"
            echo "  affected-workspaces:          ${{ needs['affected-workspaces'].result }}"
            echo "  lint:                        ${{ needs.lint.result }}"
            echo "  typecheck:                   ${{ needs.typecheck.result }}"
            echo "  test-unit:                   ${{ needs.test-unit.result }}"
            echo "  test-integration:            ${{ needs.test-integration.result }}"
            echo "  e2e-smoke:                   ${{ needs.e2e-smoke.result }}"
            echo "  build:                       ${{ needs.build.result }}"
            echo "  security:                    ${{ needs.security.result }}"
            echo "  gitleaks-guard:              ${{ needs.gitleaks-guard.result }}"
            echo "  sast:                        ${{ needs.sast.result }}"
            echo "  sbom:                        ${{ needs.sbom.result }}"
            echo "  fix-registry-guard:          ${{ needs.fix-registry-guard.result }}"
            echo "  atomic-flip-guard:           ${{ needs.atomic-flip-guard.result }}"
            echo "  file-size-guard:             ${{ needs.file-size-guard.result }}"
            echo "  claude-discipline-guard:     ${{ needs.claude-discipline-guard.result }}"
            echo "  commit-claims-pr-guard:      ${{ needs.commit-claims-pr-guard.result }}"
            echo "  pr-template-compliance-guard:${{ needs.pr-template-compliance-guard.result }}"
            echo "  naming-conventions-guard:    ${{ needs.naming-conventions-guard.result }}"
            echo "  no-telecom-guard:            ${{ needs.no-telecom-guard.result }}"
            echo "  acs-callers-guard:           ${{ needs.acs-callers-guard.result }}"
            echo "  no-stray-db-names-guard:     ${{ needs.no-stray-db-names-guard.result }}"
            echo "  dead-mount-guard:            ${{ needs.dead-mount-guard.result }}"
            echo "  query-key-factories-guard:   ${{ needs.query-key-factories-guard.result }}"
            echo "  no-duplicate-api-types-guard:${{ needs.no-duplicate-api-types-guard.result }}"
            echo "  frontend-url-guard:          ${{ needs.frontend-url-guard.result }}"
            echo "  integration-url-guard:       ${{ needs.integration-url-guard.result }}"
            echo "  safety-route-coverage-guard: ${{ needs.safety-route-coverage-guard.result }}"
            echo "  c3-noncritical-backfill-guard: ${{ needs.c3-noncritical-backfill-guard.result }}"
            echo "  c3-coverage-artifact:        ${{ needs.c3-coverage-artifact.result }}"
            echo "  c3-coverage-artifact-guard:  ${{ needs.c3-coverage-artifact-guard.result }}"
            echo "  fire-and-forget-guard:       ${{ needs.fire-and-forget-guard.result }}"
            echo "  silent-catches-guard:        ${{ needs.silent-catches-guard.result }}"
            echo "  no-orphan-migrations-guard:  ${{ needs.no-orphan-migrations-guard.result }}"
            echo "  row-iface-drift-guard:       ${{ needs.row-iface-drift-guard.result }}"
            echo "  migration-convention-guard:  ${{ needs.migration-convention-guard.result }}"
            echo "  snapshot-freshness-guard:    ${{ needs.snapshot-freshness-guard.result }}"
            echo "  code-columns-guard:          ${{ needs.code-columns-guard.result }}"
            echo "  fk-aware-joins-guard:        ${{ needs.fk-aware-joins-guard.result }}"
            echo "  response-shape-validated-guard: ${{ needs.response-shape-validated-guard.result }}"
            echo "  service-auth-context-guard: ${{ needs.service-auth-context-guard.result }}"
            echo "  migration-rollback-discipline-guard: ${{ needs.migration-rollback-discipline-guard.result }}"
            echo "  jsonb-extraction-guard: ${{ needs.jsonb-extraction-guard.result }}"
            echo "  trx-not-db-inside-transaction-guard: ${{ needs.trx-not-db-inside-transaction-guard.result }}"
            echo "  bugs-remaining-uniqueness-guard: ${{ needs.bugs-remaining-uniqueness-guard.result }}"
            echo "  mapper-naming-guard:         ${{ needs.mapper-naming-guard.result }}"
            echo "  zod-schema-parity-guard:     ${{ needs.zod-schema-parity-guard.result }}"
            echo "  scaffold-extension-guard:    ${{ needs.scaffold-extension-guard.result }}"
            echo "  generator-no-diff-guard:     ${{ needs.generator-no-diff-guard.result }}"
            echo "  generated-api-contracts-guard: ${{ needs['generated-api-contracts-guard'].result }}"
            echo "  no-column-ddl-in-raw-sql-guard: ${{ needs.no-column-ddl-in-raw-sql-guard.result }}"
            echo "  no-hardcoded-column-lists-guard: ${{ needs.no-hardcoded-column-lists-guard.result }}"
            echo "  opt-locking-new-tables-guard: ${{ needs.opt-locking-new-tables-guard.result }}"
            echo "  fix-registry-decisiveness-guard: ${{ needs.fix-registry-decisiveness-guard.result }}"
            echo "  atomic-catalogue-flip-guard: ${{ needs.atomic-catalogue-flip-guard.result }}"
            echo "  patient-app-ownership-guard: ${{ needs.patient-app-ownership-guard.result }}"
            echo "  arch-quality:                ${{ needs.arch-quality.result }}"
            echo "  repo-architecture-contract-guard: ${{ needs['repo-architecture-contract-guard'].result }}"
            echo "  a11y:                        ${{ needs.a11y.result }}"
            exit 1
          fi
          echo "All CI checks passed."
