# Signacare EMR — Redis configuration (dev + CI)
#
# BUG-197: bounded maxmemory + allkeys-lru eviction policy prevents the
# "memory fills → new writes rejected with OOM" failure class. Matches
# the policy declared in deploy/azure/modules/redis.bicep:55 for the
# bicep-defined Azure Cache module.
#
# Residual-risk and cloud-deploy follow-ups: see
# docs/audit-2026-04-19/follow-up-on-cloud-deploy.md §5.5, §5.6, §10.5,
# §10.6 for eviction impact on BullMQ queues, jwtBlacklist, persistence,
# and multi-DB isolation.
#
# Any value changed here should be paired with a PR that updates the
# fix-registry anchor R-FIX-REDIS-ALLKEYS-LRU.

maxmemory 512mb
maxmemory-policy allkeys-lru
