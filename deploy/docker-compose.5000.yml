# Docker Compose for 5,000 Concurrent Users
#
# Total capacity: ~15,000 req/sec (12 workers × 1,250 req/sec each)
#
# Hardware requirements:
#   CPU: 16 cores
#   RAM: 16GB
#   Disk: NVMe SSD (PostgreSQL WAL + data)
#   Network: 1Gbps+
#
# Start: docker compose -f docker-compose.5000.yml up -d

services:
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.5000.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512M, cpus: '2.0' }

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_POOL_MAX: 5
      DB_POOL_MIN: 1
      REDIS_URL: redis://redis:6379
      API_RATE_LIMIT: 5000
      SSE_MAX_CONNECTIONS: 5000
      TRUST_PROXY: "1"
    env_file:
      - ../apps/api/.env
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      retries: 5
    deploy:
      replicas: 12
      resources:
        limits: { memory: 512M, cpus: '1.0' }

  pgbouncer:
    image: edoburu/pgbouncer:latest
    volumes:
      - ./pgbouncer.5000.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer-userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432"]
      interval: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 256M }

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: signacaredb
      POSTGRES_USER: signacare_owner
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgresql.5000.conf:/etc/postgresql/conf.d/custom.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signacare_owner"]
      interval: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 4G, cpus: '4.0' }
    command: >
      postgres
        -c max_connections=300
        -c shared_buffers=2GB
        -c effective_cache_size=6GB
        -c work_mem=8MB
        -c maintenance_work_mem=512MB
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c wal_level=replica
        -c max_wal_senders=5
        -c checkpoint_completion_target=0.9

  postgres-replica:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signacare_owner
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 2G, cpus: '2.0' }
    command: >
      bash -c "
        until pg_basebackup -h postgres -U signacare_owner -D /var/lib/postgresql/data -Fp -Xs -P; do
          echo 'Waiting for primary...' && sleep 5
        done
        echo 'primary_conninfo = host=postgres port=5432 user=signacare_owner' > /var/lib/postgresql/data/recovery.signal
        postgres -c hot_standby=on
      "

  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --tcp-backlog 511
        --timeout 300
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 1G }

volumes:
  pgdata:
  redisdata:
