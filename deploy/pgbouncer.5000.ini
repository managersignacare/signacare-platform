; ═══════════════════════════════════════════════════════════════════════════════
; PgBouncer Config — 5,000 Concurrent Users
; ═══════════════════════════════════════════════════════════════════════════════
;
; Connection math:
;   12 API workers × 5 connections/worker = 60 app pool connections
;   12 API workers × 2 connections/worker (dbRead) = 24 read connections
;   12 API workers × 1 connection/worker (dbAdmin) = 12 admin connections
;   Total client connections: ~96
;   Server connections needed: ~150 (with multiplexing overhead)
;
; PgBouncer multiplexes 96 client connections into 150 server connections.
; Each transaction holds a server connection for ~5ms, so 150 connections
; can serve 150/0.005 = 30,000 transactions/second.

[databases]
signacareemr = host=pg-primary.internal port=5432 dbname=signacareemr

[pgbouncer]
; Transaction pooling: each SET LOCAL lives within a single transaction,
; so PgBouncer correctly isolates RLS context per request.
pool_mode = transaction

; Pool sizing for 5000 users
default_pool_size = 75          ; server connections per database
min_pool_size = 20              ; pre-warmed connections
reserve_pool_size = 50          ; overflow during spikes
reserve_pool_timeout = 3        ; seconds to wait before using reserve

; Client connections
max_client_conn = 500           ; total client connections accepted
max_db_connections = 200        ; max server connections to PostgreSQL

; Timeouts
server_idle_timeout = 120       ; close idle server connections after 2 min
client_idle_timeout = 300       ; close idle client connections after 5 min
query_timeout = 60              ; kill queries running > 60s
client_login_timeout = 30

; Network
listen_addr = 0.0.0.0
listen_port = 6432
tcp_keepalive = 1
tcp_keepidle = 30
tcp_keepintvl = 10

; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Logging
log_connections = 0             ; reduce log noise at scale
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
verbose = 0

; Admin
admin_users = signacare
stats_users = signacare
