# Production Docker Compose — scales Signacare EMR for 1000+ concurrent users
#
# Architecture:
#   Nginx (load balancer) → 4x API workers → PgBouncer → PostgreSQL primary + replica
#                                           → Redis Cluster (rate limiting + SSE + queues)
#                                           → Ollama (GPU server)
#                                           → Whisper (GPU server)
#
# Start: docker compose -f docker-compose.production.yml up -d --scale api=4

version: '3.9'

services:
  # ── Nginx Load Balancer ──
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── API Server (scalable) ──
  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_APP_USER: ${DB_APP_USER}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSL: "true"
      DB_POOL_MAX: 10
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PHI_ENCRYPTION_KEY: ${PHI_ENCRYPTION_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      API_RATE_LIMIT: 3000
      AUTH_RATE_LIMIT: 30
      TRUST_PROXY: "1"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 4
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ── PgBouncer (connection pooling) ──
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 50
      MAX_CLIENT_CONN: 600
      MAX_DB_CONNECTIONS: 100
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── PostgreSQL Primary ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c work_mem=4MB
        -c maintenance_work_mem=128MB
        -c wal_level=replica
        -c max_wal_senders=3
        -c hot_standby=on

  # ── Redis (rate limiting + SSE + BullMQ) ──
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Web Frontend ──
  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
