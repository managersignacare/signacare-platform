; ═══════════════════════════════════════════════════════════════════════════════
; Signacare EMR — PgBouncer Config (1,000 concurrent users)
; ═══════════════════════════════════════════════════════════════════════════════
;
; PgBouncer sits between the API servers and PostgreSQL,
; multiplexing 500+ app connections into ~100 real PG connections.
;
; Install: apt install pgbouncer
; Config:  /etc/pgbouncer/pgbouncer.ini
; Start:   systemctl start pgbouncer

[databases]
; RLS Gold Standard: app_user for runtime queries, signacare for migrations
signacareemr = host=pg-primary.internal port=5432 dbname=signacareemr

[pgbouncer]
pool_mode = transaction
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 20
reserve_pool_timeout = 3
max_client_conn = 600
max_db_connections = 100
server_idle_timeout = 300
client_idle_timeout = 300
query_timeout = 120
client_login_timeout = 60
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
admin_users = signacare
stats_users = signacare
