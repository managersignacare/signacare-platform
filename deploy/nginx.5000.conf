# Nginx Configuration for 5,000 Concurrent Users
# Tested capacity: 15,000+ req/sec
#
# Architecture:
#   Client → Nginx (TLS termination + load balancing) → 12 API workers
#   Static assets served directly by Nginx (no proxy overhead)
#   SSE connections long-polled through to upstream

worker_processes auto;           # Use all CPU cores
worker_rlimit_nofile 65535;      # Max open files per worker

events {
    worker_connections 16384;    # Connections per worker (total = workers × 16384)
    use epoll;                   # Linux high-performance event model
    multi_accept on;
}

http {
    # ── Performance ──
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;
    types_hash_max_size 4096;

    # ── Buffers ──
    client_body_buffer_size 16k;
    client_max_body_size 50m;    # For file uploads + Whisper audio
    proxy_buffer_size 8k;
    proxy_buffers 8 16k;

    # ── Gzip ──
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types application/json application/javascript text/css text/plain application/fhir+json application/fhir+ndjson;
    gzip_vary on;

    # ── Rate Limiting (Layer 7) ──
    limit_req_zone $binary_remote_addr zone=api:32m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth:8m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=sse:16m;

    # ── Upstream: 12 API workers via PM2 ──
    upstream api_backend {
        least_conn;              # Route to least-busy worker
        keepalive 256;           # Persistent connections to upstream

        server 127.0.0.1:4000;
        # PM2 cluster mode handles all 12 workers on the same port
    }

    # ── HTTPS Server ──
    server {
        listen 443 ssl http2;
        server_name emr.signacare.com.au;

        # TLS
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Static assets (React SPA) ──
        location / {
            root /var/www/signacare/web;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── API proxy ──
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ── SSE (long-lived connections) ──
        location /api/v1/events/ {
            limit_conn sse 5000;   # Max 5000 concurrent SSE connections

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            # SSE-specific: disable buffering, long timeouts
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;  # 1 hour
            chunked_transfer_encoding off;

            # Nginx buffering would break SSE
            add_header X-Accel-Buffering "no";
        }

        # ── AI/Whisper (long-running requests) ──
        location /api/v1/llm/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            # Extended timeout for AI processing
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 50m;  # Audio files
        }

        # ── File uploads ──
        location /api/v1/patients/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            client_max_body_size 25m;  # Document uploads
        }

        # ── Auth rate limiting ──
        location /api/v1/auth/login {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
        }

        # ── Health check (for load balancer) ──
        location /health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            access_log off;
        }

        # ── Swagger UI ──
        location /api/docs {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── FHIR ──
        location /api/v1/fhir/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
        }
    }

    # ── HTTP → HTTPS redirect ──
    server {
        listen 80;
        server_name emr.signacare.com.au;
        return 301 https://$host$request_uri;
    }
}
