# ═══════════════════════════════════════════════════════════════════════════════
# Signacare EMR — Nginx Reverse Proxy Config (1,000 concurrent users)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Place at: /etc/nginx/sites-enabled/signacare.conf
# Test:     nginx -t
# Reload:   systemctl reload nginx

# Upstream API servers (3 nodes, each running PM2 cluster on port 4000)
upstream signacare_api {
    least_conn;
    server api1.internal:4000 max_fails=3 fail_timeout=30s;
    server api2.internal:4000 max_fails=3 fail_timeout=30s;
    server api3.internal:4000 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name signacare.yourdomain.com.au;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name signacare.yourdomain.com.au;

    # ── SSL ──
    ssl_certificate     /etc/letsencrypt/live/signacare.yourdomain.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/signacare.yourdomain.com.au/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ── Logging ──
    access_log /var/log/nginx/signacare-access.log;
    error_log  /var/log/nginx/signacare-error.log;

    # ── Client Limits ──
    client_max_body_size 50m;
    client_body_timeout  120s;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── Static Frontend (React SPA) ──
    root /var/www/signacare/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-cache";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API Proxy ──
    location /api/ {
        proxy_pass http://signacare_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # ── Health Check ──
    location /health {
        proxy_pass http://signacare_api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Whisper Upload (large body, long timeout) ──
    location /api/v1/llm/ambient-note {
        proxy_pass http://signacare_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        client_max_body_size 100m;
    }
}
