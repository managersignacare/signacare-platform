# PostgreSQL Configuration for 5,000 Concurrent Users
# Apply via: ALTER SYSTEM SET <param> = '<value>'; SELECT pg_reload_conf();
# Or include in postgresql.conf

# ── Connections ──
max_connections = 300            # 200 for PgBouncer + 50 admin + 50 headroom
superuser_reserved_connections = 5

# ── Memory ──
shared_buffers = 2GB             # 25% of RAM (recommended for 8GB+ server)
effective_cache_size = 6GB       # 75% of RAM
work_mem = 8MB                   # Per-sort/hash operation (careful: concurrent × work_mem)
maintenance_work_mem = 512MB     # VACUUM, CREATE INDEX
temp_buffers = 16MB

# ── WAL (Write-Ahead Log) ──
wal_level = replica              # Supports read replicas
max_wal_senders = 5              # For streaming replication
wal_keep_size = 1GB
checkpoint_completion_target = 0.9
min_wal_size = 256MB
max_wal_size = 2GB

# ── Query Planner ──
random_page_cost = 1.1           # SSD storage (default 4.0 is for spinning disks)
effective_io_concurrency = 200   # SSD concurrent IO
default_statistics_target = 200  # Better query plans

# ── Autovacuum ──
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_cost_delay = 2ms

# ── Logging ──
log_min_duration_statement = 200 # Log queries > 200ms
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0               # Log all temp file usage

# ── Locale ──
timezone = 'Australia/Melbourne'
lc_messages = 'en_AU.UTF-8'

# ── RLS Performance ──
# RLS policies are evaluated per-row. With 5000 users, ensure:
# - clinic_id is indexed on every table (already done: 489 indexes)
# - set_config('app.clinic_id', ...) is called once per transaction (rlsMiddleware)
# - Avoid full table scans on large tables (clinical_notes, audit_log)
