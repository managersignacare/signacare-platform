services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-signacaredb}
      POSTGRES_USER: ${DB_USER:-signacare_owner}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-signacare_owner} -d ${DB_NAME:-signacaredb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # BUG-197: explicit config file sets maxmemory + allkeys-lru eviction.
    # Without this, the image default is maxmemory=0 + noeviction, which
    # rejects writes with OOM under memory pressure. See infra/redis.conf
    # and docs/audit-2026-04-19/follow-up-on-cloud-deploy.md §5.5.
    command: ["redis-server", "/etc/redis/redis.conf"]
    volumes:
      - redis_data:/data
      - ./infra/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── S1.1: MinIO — S3-compatible object store for dev ──────────────────────
  # Lets the BlobStorage facade run against a local S3 endpoint without
  # touching real AWS. The createbuckets sidecar makes the default bucket
  # exist on first start so the API doesn't crash on startup.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-signacareminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-signacareminio-dev-password}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # MinIO console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-signacareminio} ${MINIO_ROOT_PASSWORD:-signacareminio-dev-password};
      mc mb --ignore-existing local/signacare-attachments;
      mc anonymous set none local/signacare-attachments;
      exit 0;
      "
    restart: "no"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # Pull llama3.2 on first start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2 && wait"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "-r", "dotenv/config", "-r", "tsconfig-paths/register",
              "-r", "ts-node/register/transpile-only",
              "--project", "apps/api/tsconfig.node.json",
              "apps/api/scripts/migrate.ts"]
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  minio_data:
