server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Clinical audio uploads are proxied through this web container before
    # reaching the API. Keep this aligned with deploy/nginx.conf and the API's
    # ambient/scribe multer limits so staging/prod do not reject uploads first.
    client_max_body_size 256m;
    client_body_timeout 600s;

    # ── S2.6: Cache headers for CDN front + browser ──────────────────────────
    #
    # Vite emits hashed asset filenames like:
    #     PatientDetailPage-dfPn0tb9.js
    #     index-DMfR70SQ.js
    #     Box-CV_G89_X.js
    #
    # The hash changes every time the file content changes, so a fresh
    # build cannot collide with a stale URL. That makes the assets safe
    # to cache forever — both at the browser and at any CDN edge sitting
    # in front of this nginx (CloudFront, Cloudflare, Fastly).
    #
    # index.html is the OPPOSITE — it must NEVER be cached, otherwise
    # users would be served old HTML referencing hashed asset filenames
    # that no longer exist after a deploy.
    #
    # The CDN respects Cache-Control directly so a single edge config
    # (cache everything according to origin headers) is sufficient.

    # Long-cache hashed assets — 1 year, immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # Long-cache static fonts and favicons
    location ~* \.(woff2?|ttf|eot|otf|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # Always-revalidate index.html (and any HTML)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Serve React app — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to the backend.
    # API_UPSTREAM is rendered at container start from an env var,
    # e.g. https://signacare-api-staging.azurewebsites.net/api
    # It must include the /api path so request paths remain unchanged.
    location /api/ {
        client_max_body_size 256m;
        proxy_pass         ${API_UPSTREAM}/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name     $proxy_host;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_connect_timeout 10s;
        proxy_send_timeout 660s;
        proxy_read_timeout 660s;
        # Never cache API responses at the CDN. Belt-and-braces — the API
        # also sets its own Cache-Control: no-store on protected endpoints.
        add_header Cache-Control "no-store" always;
    }

    # Gzip — extended set so JS modules, JSON, source maps, and SVG all compress
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/ttf
        font/otf;
}
